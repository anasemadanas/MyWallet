name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "mywallet_android/**"
      - ".github/workflows/build_android.yml"
  pull_request:
    paths:
      - "mywallet_android/**"
      - ".github/workflows/build_android.yml"

jobs:
  build:
    name: Build MyWallet Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build debug APK
        working-directory: mywallet_android
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mywallet-android-debug
          path: mywallet_android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
